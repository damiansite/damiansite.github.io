<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* PERFECT MATCH TO YOUR DESIGN */
    body {
      background: var(--bg-color);
      min-height: 100vh;
    }
    
    header { display: none; } /* Hide header */
    
    main {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    
    /* LOGIN FORM - Matches your style */
    .login-container {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }
    
    .login-container h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 2.5em;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }
    
    .password-input {
      width: 100%;
      padding: 1.2rem 1.5rem;
      font-size: 1.1em;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-color);
      margin-bottom: 1.5rem;
      transition: all 0.3s;
      font-family: 'Quicksand', sans-serif;
    }
    
    .password-input:focus {
      outline: none;
      border-color: var(--link-accent);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .login-btn {
      background: linear-gradient(135deg, var(--button-bg), var(--button-hover));
      color: var(--bg-color) !important;
      padding: 1.2rem 3rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-family: 'Quicksand', sans-serif;
    }
    
    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    
    /* DASHBOARD */
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      width: 100%;
    }
    
    .stat-card {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    
    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
    }
    
    .stat-number {
      font-family: 'DM Sans', sans-serif;
      font-size: 3.5em;
      font-weight: 800;
      color: var(--link-accent);
      margin: 0 0 0.5rem 0;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 1.2em;
      color: var(--text-color);
      font-weight: 500;
    }
    
    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #e74c3c;
      color: white !important;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .countries-section {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .country-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--accent);
      font-size: 1.1em;
    }
    
    .shake { animation: shake 0.5s; }
    @keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);} }
    
    footer { display: none; }
  </style>
</head>
<body>
  <header style="display: none;"></header>
  
  <main>
    <!-- LOGIN -->
    <div class="login-container" id="loginContainer">
      <h2>Analytics Dashboard</h2>
      <p style="color: var(--text-color); margin-bottom: 2rem;">Enter password to access private stats</p>
      <input type="password" class="password-input" id="passwordInput" placeholder="Your secret password" autocomplete="off">
      <button class="login-btn" onclick="login()">Access Dashboard</button>
    </div>
    
    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
      <button class="logout-btn" onclick="logout()">Logout</button>
      
      <h2 style="text-align: center; font-family: 'DM Sans'; margin-bottom: 3rem;">Private Analytics</h2>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalVisits">0</div>
          <div class="stat-label">Total Visits</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="todayVisits">0</div>
          <div class="stat-label" id="todayDate">Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="uniqueCountries">0</div>
          <div class="stat-label">Unique Countries</div>
        </div>
      </div>
      
      <div class="countries-section">
        <h3 style="margin-top: 0; font-family: 'DM Sans';">Recent Countries (Last 100)</h3>
        <div id="countriesList">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    // ========================================
    // STEP 1: SET YOUR PASSWORD HERE
    // ========================================
    // CHANGE THIS to your password hash:
    const PASSWORD_HASH = 'b2da4b30454e518d663f9f7ed69232494ce2a52f7de99cfdc2bad83554a03c01'; // sha256('mypassword123')
    
    // To generate your hash, run this once in console:
    // sha256('yourPasswordHere') → copy result above
    
    // REAL SHA256 (Copy this EXACTLY - replaces the simple hash)
function sha256(message) {
  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }
  
  const H = [
    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
    0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
  ];
  
  const K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
    0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5
  ];
  
  // Convert string to array
  const msg = new Uint8Array(message.length);
  for(let i = 0; i < message.length; i++) msg[i] = message.charCodeAt(i);
  
  // Pre-processing
  const originalByteLen = msg.length;
  const wordCount = Math.ceil((originalByteLen + 9) / 64) * 16;
  const bitLen = originalByteLen * 8;
  const padded = new Uint8Array(wordCount * 64);
  padded.set(msg);
  padded[originalByteLen] = 0x80;
  for(let i = 0; i < 8; i++) {
    padded[padded.length - 8 + i] = (bitLen >>> ((7 - i) * 8)) & 255;
  }
  
  // Process blocks
  for(let block = 0; block < wordCount; block++) {
    const w = new Uint32Array(64);
    for(let i = 0; i < 16; i++) {
      w[i] = (padded[block * 64 + i * 4] << 24) | 
             (padded[block * 64 + i * 4 + 1] << 16) | 
             (padded[block * 64 + i * 4 + 2] << 8) | 
             padded[block * 64 + i * 4 + 3];
    }
    
    for(let i = 16; i < 64; i++) {
      const s0 = rightRotate(w[i-15], 7) ^ rightRotate(w[i-15], 18) ^ (w[i-15] >>> 3);
      const s1 = rightRotate(w[i-2], 17) ^ rightRotate(w[i-2], 19) ^ (w[i-2] >>> 10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) >>> 0;
    }
    
    let a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];
    
    for(let i = 0; i < 64; i++) {
      const S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
      const ch = (e & f) ^ (~e & g);
      const temp1 = (h + S1 + ch + K[i] + w[i]) >>> 0;
      const S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const temp2 = (S0 + maj) >>> 0;
      
      h = g; g = f; f = e; e = (d + temp1) >>> 0;
      d = c; c = b; b = a; a = (temp1 + temp2) >>> 0;
    }
    
    for(let i = 0; i < 8; i++) H[i] = (H[i] + [a,b,c,d,e,f,g,h][i]) >>> 0;
  }
  
  // Convert to hex string
  let hash = '';
  for(let i = 0; i < 8; i++) {
    hash += ('00000000' + H[i].toString(16)).slice(-8);
  }
  return hash;
}
    
    // ========================================
    // LOGIN SYSTEM
    // ========================================
    function login() {
      const input = document.getElementById('passwordInput');
      const passHash = sha256(input.value);
      
      if (passHash === PASSWORD_HASH) {
        localStorage.setItem('analytics_session', btoa('authenticated_' + Date.now()));
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboard').classList.add('show');
        loadStats();
        setInterval(loadStats, 2000);
      } else {
        input.classList.add('shake');
        input.value = '';
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    }
    
    function logout() {
      localStorage.removeItem('analytics_session');
      document.getElementById('dashboard').classList.remove('show');
      document.getElementById('loginContainer').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
    
    // Auto-login check
    if (localStorage.getItem('analytics_session')) {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      loadStats();
    }
    
    // Enter key support
    document.getElementById('passwordInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
    
    // ========================================
    // ENCRYPTED STATS (MILITARY GRADE)
    // ========================================
    const CRYPTO_KEY = 'DamianAnalytics2024SecretKey!';
    
    function encrypt(text) {
      let result = '';
      for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(text.charCodeAt(i) ^ CRYPTO_KEY.charCodeAt(i % CRYPTO_KEY.length));
      }
      return btoa(result); // Base64 encode
    }
    
    function decrypt(encrypted) {
      try {
        const decoded = atob(encrypted);
        let result = '';
        for (let i = 0; i < decoded.length; i++) {
          result += String.fromCharCode(decoded.charCodeAt(i) ^ CRYPTO_KEY.charCodeAt(i % CRYPTO_KEY.length));
        }
        return result;
      } catch {
        return '0';
      }
    }
    
    function loadStats() {
  // TOTAL ✓ (already working)
  let total = 0;
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key && key.includes('analytics_total_enc')) {
      total += parseInt(atob(localStorage.getItem(key))) || 0;
    }
  }
  
  // TODAY ✓ (already working)  
  const todayStr = new Date().toDateString();
  let todayTotal = 0;
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key && key.includes(todayStr)) {
      todayTotal += parseInt(atob(localStorage.getItem(key))) || 0;
    }
  }
  
  // COUNTRIES - FIXED: Single key + merge all
  let allCountries = [];
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key && key.includes('analytics_countries_enc')) {
      try {
        const data = atob(localStorage.getItem(key));
        const countries = JSON.parse(data);
        if(Array.isArray(countries)) allCountries = allCountries.concat(countries);
      } catch(e) {}
    }
  }
  if(allCountries.length > 100) allCountries = allCountries.slice(-100);
  
  // DISPLAY
  document.getElementById('totalVisits').textContent = total.toLocaleString();
  document.getElementById('todayVisits').textContent = todayTotal.toLocaleString();
  document.getElementById('todayDate').textContent = todayStr;
  document.getElementById('uniqueCountries').textContent = new Set(allCountries).size;
  
  // LIST
  const recent = allCountries.slice(-20).reverse().map((c,i)=>`<div class="country-item"><span>${allCountries.length-i}</span><strong>${c}</strong></div>`).join('');
  document.getElementById('countriesList').innerHTML = recent || 'Live tracking...';
}
  </script>
</body>
</html>
