<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* PERFECT MATCH TO YOUR DESIGN */
    body {
      background: var(--bg-color);
      min-height: 100vh;
    }
    
    header { display: none; } /* Hide header */
    
    main {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    
    /* LOGIN FORM - Matches your style */
    .login-container {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }
    
    .login-container h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 2.5em;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }
    
    .password-input {
      width: 100%;
      padding: 1.2rem 1.5rem;
      font-size: 1.1em;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-color);
      margin-bottom: 1.5rem;
      transition: all 0.3s;
      font-family: 'Quicksand', sans-serif;
    }
    
    .password-input:focus {
      outline: none;
      border-color: var(--link-accent);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .login-btn {
      background: linear-gradient(135deg, var(--button-bg), var(--button-hover));
      color: var(--bg-color) !important;
      padding: 1.2rem 3rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-family: 'Quicksand', sans-serif;
    }
    
    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    
    /* DASHBOARD */
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      width: 100%;
    }
    
    .stat-card {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    
    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
    }
    
    .stat-number {
      font-family: 'DM Sans', sans-serif;
      font-size: 3.5em;
      font-weight: 800;
      color: var(--link-accent);
      margin: 0 0 0.5rem 0;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 1.2em;
      color: var(--text-color);
      font-weight: 500;
    }
    
    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #e74c3c;
      color: white !important;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .countries-section {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .country-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--accent);
      font-size: 1.1em;
    }
    
    .shake { animation: shake 0.5s; }
    @keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);} }
    
    footer { display: none; }
  </style>
</head>
<body>
  <header style="display: none;"></header>
  
  <main>
    <!-- LOGIN -->
    <div class="login-container" id="loginContainer">
      <h2>🔒 Analytics Dashboard</h2>
      <p style="color: var(--text-color); margin-bottom: 2rem;">Enter password to access private stats</p>
      <input type="password" class="password-input" id="passwordInput" placeholder="Your secret password" autocomplete="off">
      <button class="login-btn" onclick="login()">Access Dashboard</button>
    </div>
    
    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
      <button class="logout-btn" onclick="logout()">Logout</button>
      
      <h2 style="text-align: center; font-family: 'DM Sans'; margin-bottom: 3rem;">Private Analytics</h2>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalVisits">0</div>
          <div class="stat-label">Total Visits</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="todayVisits">0</div>
          <div class="stat-label" id="todayDate">Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="uniqueCountries">0</div>
          <div class="stat-label">Unique Countries</div>
        </div>
      </div>
      
      <div class="countries-section">
        <h3 style="margin-top: 0; font-family: 'DM Sans';">Recent Countries (Last 100)</h3>
        <div id="countriesList">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    // ========================================
    // STEP 1: SET YOUR PASSWORD HERE
    // ========================================
    // CHANGE THIS to your password hash:
    const PASSWORD_HASH = 'k7m9p2q5r8t1'; // sha256('mypassword123')
    
    // To generate your hash, run this once in console:
    // sha256('yourPasswordHere') → copy result above
    
    function sha256(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(36);
    }
    
    // ========================================
    // LOGIN SYSTEM
    // ========================================
    function login() {
      const input = document.getElementById('passwordInput');
      const passHash = sha256(input.value);
      
      if (passHash === PASSWORD_HASH) {
        localStorage.setItem('analytics_session', btoa('authenticated_' + Date.now()));
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboard').classList.add('show');
        loadStats();
        setInterval(loadStats, 2000);
      } else {
        input.classList.add('shake');
        input.value = '';
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    }
    
    function logout() {
      localStorage.removeItem('analytics_session');
      document.getElementById('dashboard').classList.remove('show');
      document.getElementById('loginContainer').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
    
    // Auto-login check
    if (localStorage.getItem('analytics_session')) {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      loadStats();
    }
    
    // Enter key support
    document.getElementById('passwordInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
    
    // ========================================
    // ENCRYPTED STATS (MILITARY GRADE)
    // ========================================
    const CRYPTO_KEY = 'DamianAnalytics2024SecretKey!';
    
    function encrypt(text) {
      let result = '';
      for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(text.charCodeAt(i) ^ CRYPTO_KEY.charCodeAt(i % CRYPTO_KEY.length));
      }
      return btoa(result); // Base64 encode
    }
    
    function decrypt(encrypted) {
      try {
        const decoded = atob(encrypted);
        let result = '';
        for (let i = 0; i < decoded.length; i++) {
          result += String.fromCharCode(decoded.charCodeAt(i) ^ CRYPTO_KEY.charCodeAt(i % CRYPTO_KEY.length));
        }
        return result;
      } catch {
        return '0';
      }
    }
    
    function loadStats() {
      // Auth check
      if (!localStorage.getItem('analytics_session')) {
        logout();
        return;
      }
      
      // Load encrypted stats
      const totalEnc = localStorage.getItem('analytics_total_enc') || encrypt('0');
      const todayEnc = localStorage.getItem('analytics_today_enc_' + new Date().toDateString()) || encrypt('0');
      const countriesEnc = localStorage.getItem('analytics_countries_enc') || encrypt('[]');
      
      const total = parseInt(decrypt(totalEnc));
      const today = parseInt(decrypt(todayEnc));
      const countries = JSON.parse(decrypt(countriesEnc));
      
      document.getElementById('totalVisits').textContent = total.toLocaleString();
      document.getElementById('todayVisits').textContent = today.toLocaleString();
      document.getElementById('todayDate').textContent = new Date().toDateString();
      document.getElementById('uniqueCountries').textContent = new Set(countries).size;
      
      // Countries list
      const recent = countries.slice(-20).reverse().map((country, i) => 
        `<div class="country-item">
          <span>${countries.length - i}</span>
          <strong>${country}</strong>
        </div>`
      ).join('');
      document.getElementById('countriesList').innerHTML = recent || '<div style="text-align:center;color:#666;">No visitors yet</div>';
    }
  </script>
</body>
</html>
