<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Site</title>
<style>
/* -- same CSS as previous -- */
:root {
    --header-bg: #efe3d8;
    --body-bg: #f7f2ee;
    --text: #2b2a28;
    --accent: #b0714f;
    --footer-bg: #1f1e1c;
    --btn-bg: rgba(255,255,255,0.3);
    --btn-color: var(--text);
}
[data-theme="dark"] {
    --header-bg: #1e1d1b;
    --body-bg: #161514;
    --text: #e4e1dc;
    --accent: #d2a07c;
    --footer-bg: #0f0e0d;
    --btn-bg: rgba(255,255,255,0.1);
    --btn-color: var(--text);
}
/* ... all previous CSS continues ... */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background: var(--body-bg);color: var(--text);line-height:1.6;user-select:none;}
/* header, nav, main, footer, etc. same as before */
</style>
</head>
<body>

<header>
<div class="header-container">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="education.html">Education</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="resources.html">Resources</a>
    </nav>
    <div class="controls">
        <span id="langEN" onclick="setLang('en')">EN</span>|
        <span id="langRO" onclick="setLang('ro')">RO</span>
        <span id="langAUTO"></span>
        <button class="mode-btn" id="modeIcon" onclick="toggleTheme()">
            <svg id="modeSVG" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        </button>
    </div>
</div>
</header>

<main>
<section class="content-block">
<img src="https://via.placeholder.com/400x250" alt="">
<div>
<h1>Responsive Layout</h1>
<p>Images align left on large screens and above text on mobile. Text alignment and titles adapt automatically.</p>
</div>
</section>
</main>

<footer>
<div class="footer-container">
<div>
<strong>Email</strong>
<a href="mailto:contact@example.com">contact@example.com</a>
</div>
<div>
<strong>Social</strong>
<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">LinkedIn</a>
</div>
<div class="footer-note">
<div class="footer-controls">
<button class="mode-btn" id="footerMode" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg></button>
<span id="footerLang"></span>
</div>
© 2025 Mirza Damian. All rights reserved.
</div>
</div>
</footer>

<div id="google_translate_element" style="display:none"></div>
<script type="text/javascript">
function googleTranslateElementInit(){
    new google.translate.TranslateElement({
        pageLanguage:'en',
        includedLanguages:'ro',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    },'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
/* ===== Active menu ===== */
document.querySelectorAll("nav a").forEach(link=>{
    if(location.pathname.endsWith(link.getAttribute("href"))) link.classList.add("active");
});
function toggleMenu(){document.getElementById("nav").classList.toggle("show");}

/* ===== Theme ===== */
const root=document.documentElement;
function toggleTheme(){
    const dark=root.getAttribute("data-theme")==="dark";
    root.setAttribute("data-theme",dark?"light":"dark");
}
if(window.matchMedia("(prefers-color-scheme: dark)").matches){
    root.setAttribute("data-theme","dark");
}

/* ===== Language ===== */
const langEN=document.getElementById("langEN");
const langRO=document.getElementById("langRO");
const footerLang=document.getElementById("footerLang");
let currentLang="en";

// Restore language preference after reload
let savedLang = localStorage.getItem("preferredLang");
if(savedLang){
    currentLang = savedLang;
    localStorage.removeItem("preferredLang");
}

function updateLangDisplay(){
    const activeColor = document.querySelector("nav a.active")?getComputedStyle(document.querySelector("nav a.active")).color:"var(--accent)";
    langEN.style.color=currentLang==="en"?activeColor:"var(--text)";
    langRO.style.color=currentLang==="ro"?activeColor:"var(--text)";
    langEN.style.fontWeight=currentLang==="en"?"700":"400";
    langRO.style.fontWeight=currentLang==="ro"?"700":"400";
    footerLang.textContent="Current: "+currentLang.toUpperCase();
}

function setLang(lang){
    if(lang==="en"){
        localStorage.setItem("preferredLang","en");
        location.reload();
        return;
    }
    currentLang = lang;
    updateLangDisplay();

    // Ensure Google Translate is ready
    function applyTranslation(){
        const combo = document.querySelector('.goog-te-combo');
        if(combo){
            combo.value='ro';
            combo.dispatchEvent(new Event('change'));
        } else {
            setTimeout(applyTranslation,300);
        }
    }
    applyTranslation();
}

updateLangDisplay();

// Auto detect device language if not EN/RO
const deviceLang=navigator.language.slice(0,2);
if(!["en","ro"].includes(deviceLang)){
    currentLang=deviceLang;
    updateLangDisplay();
}

/* ===== Protection ===== */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("selectstart",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
    if((e.ctrlKey && ["c","u","s"].includes(e.key.toLowerCase()))|| e.key==="F12") e.preventDefault();
});
</script>
</body>
</html>
